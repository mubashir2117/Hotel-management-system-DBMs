<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guests — Grand Palace Hotel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<style>
  /* Actions column ke liye simple alignment styling */
  .actions-cell { display: flex; gap: 8px; align-items: center; }
  .btn-danger { background: #dc2626; color: #fff; border: none; }
  .btn-danger:hover { background: #b91c1c; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: #6b7a8d; margin-bottom: 7px; }
  .form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid #e2e2dc; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; box-sizing: border-box; }
  .form-group input:focus { border-color: #C9A84C; }
</style>
</head>
<body>
<div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-icon">GP</div><div><div class="logo-text">Grand Palace</div><div class="logo-sub">Admin Portal</div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <a href="dashboard.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a href="rooms.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Rooms</a>
    <a href="bookings.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/></svg>Bookings</a>
    <div class="nav-section">Management</div>
    <a href="guests.html" class="nav-item active"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Guests</a>
    <a href="pricing.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Pricing</a>
    <a href="services.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>Room Services</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar" id="userAvatar">A</div><div><div class="user-name" id="userName">Admin</div><div class="user-role" id="userRole">Administrator</div></div></div>
    <button class="logout-btn" onclick="logout()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
  </div>
</aside>

<div class="main-content">
  <div class="top-bar">
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    <h1>Guests</h1>
  </div>
  <div class="page-content">
    <div id="alertBox"></div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Country</th><th>Total Bookings</th><th>Actions</th></tr></thead>
          <tbody id="guestsTable"><tr><td colspan="7"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="guestModal">
  <div class="modal" style="max-width:660px;">
    <div class="modal-header">
      <div class="modal-title" id="guestModalTitle">Guest Profile</div>
      <button class="modal-close" onclick="closeModal('guestModal')">×</button>
    </div>
    <div class="modal-body" id="guestModalBody"></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('guestModal')">Close</button></div>
  </div>
</div>

<div class="modal-overlay" id="editGuestModal">
  <div class="modal" style="max-width:450px;">
    <div class="modal-header">
      <div class="modal-title">Edit Guest Profile</div>
      <button class="modal-close" onclick="closeModal('editGuestModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editUserId">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="editGuestName" required>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="editGuestPhone">
      </div>
      <div class="form-group">
        <label>Country</label>
        <input type="text" id="editGuestCountry">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('editGuestModal')">Cancel</button>
      <button class="btn" id="saveGuestBtn" onclick="saveGuestUpdate()">Save Changes</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
requireAdmin();
initSidebar();

async function loadGuests() {
  try {
    const guests = await api.get('/guests');
    const tbody = document.getElementById('guestsTable');
    if (guests.length === 0) { tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><p>No guests yet</p></div></td></tr>'; return; }
    tbody.innerHTML = guests.map(g => `
      <tr>
        <td>#${g.GuestId}</td>
        <td><strong>${g.Name}</strong></td>
        <td>${g.Email}</td>
        <td>${g.Phone || '—'}</td>
        <td>${g.Country || '—'}</td>
        <td>${g.TotalBookings || 0}</td>
        <td>
          <div class="actions-cell">
            <button class="btn btn-sm btn-outline" onclick="viewGuest(${g.GuestId})">View</button>
            <button class="btn btn-sm btn-outline" style="border-color:#C9A84C;color:#C9A84C;" onclick="openEditModal(${g.GuestId}, '${g.UserId}', \`${g.Name.replace(/'/g, "\\'")}\`, '${g.Phone || ''}', '${g.Country || ''}')">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteGuest(${g.UserId}, ${g.GuestId})">Delete</button>
          </div>
        </td>
      </tr>`).join('');
  } catch(e) { showAlert('alertBox', e.message); }
}

async function viewGuest(id) {
  try {
    const g = await api.get(`/guests/${id}`);
    document.getElementById('guestModalTitle').textContent = `Guest: ${g.Name}`;
    let bookingsHtml = '<p style="color:#6b7a8d;font-size:13px;">No bookings found.</p>';
    if (g.bookings && g.bookings.length > 0) {
      bookingsHtml = `<div class="table-wrap"><table>
        <thead><tr><th>Booking ID</th><th>Room</th><th>Check-in</th><th>Check-out</th><th>Total</th><th>Status</th></tr></thead>
        <tbody>${g.bookings.map(b => `<tr>
          <td>#${b.BookingId}</td><td>Room ${b.RoomNumber}</td>
          <td>${formatDate(b.CheckInDate)}</td><td>${formatDate(b.CheckOutDate)}</td>
          <td>${formatCurrency(b.TotalPrice)}</td><td>${statusBadge(b.Status)}</td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    }
    document.getElementById('guestModalBody').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
        <div><div class="stat-label">Email</div><div>${g.Email}</div></div>
        <div><div class="stat-label">Phone</div><div>${g.Phone || '—'}</div></div>
        <div><div class="stat-label">Country</div><div>${g.Country || '—'}</div></div>
        <div><div class="stat-label">Member Since</div><div>${formatDate(g.CreatedAt)}</div></div>
      </div>
      <div class="card-title" style="margin-bottom:12px;">Booking History</div>
      ${bookingsHtml}`;
    openModal('guestModal');
  } catch(e) { showAlert('alertBox', e.message); }
}

/* ===== EDIT GUEST ACTIONS ===== */
function openEditModal(guestId, userId, name, phone, country) {
  if (!userId || userId === 'undefined') {
    alert("Error: User ID missing. Please refresh the page.");
    return;
  }
  document.getElementById('editUserId').value = userId;
  document.getElementById('editGuestName').value = name;
  document.getElementById('editGuestPhone').value = phone;
  document.getElementById('editGuestCountry').value = country;
  openModal('editGuestModal');
}

async function saveGuestUpdate() {
  const userId = document.getElementById('editUserId').value;
  const name = document.getElementById('editGuestName').value.trim();
  const phone = document.getElementById('editGuestPhone').value.trim();
  const country = document.getElementById('editGuestCountry').value.trim();

  if (!name) { alert('Name cannot be empty.'); return; }

  const btn = document.getElementById('saveGuestBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const res = await fetch(`http://localhost:5000/api/guests/${userId}`, {
      method: 'PUT',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('hotelToken')}`
      },
      body: JSON.stringify({ name, phone, country })
    });
    
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Failed to update guest profile');

    closeModal('editGuestModal');
    loadGuests(); 
    alert('Guest profile updated successfully!');
  } catch(e) {
    alert("Error: " + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Changes';
  }
}

/* ===== DELETE GUEST ACTION (CLEANED & FIXED) ===== */
async function deleteGuest(userId, guestId) {
  if (!userId || userId === 'undefined') {
    alert("Error: Cannot delete. User ID is missing.");
    return;
  }

  if (!confirm('Are you sure you want to delete this guest? This will delete their profile data.')) return;

  try {
    const res = await fetch(`http://localhost:5000/api/guests/${userId}`, {
      method: 'DELETE',
      headers: { 
        'Authorization': `Bearer ${localStorage.getItem('hotelToken')}`
      }
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Failed to delete user');

    loadGuests(); 
    alert('Guest deleted successfully!');
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
loadGuests();
</script>
</body>
</html>
