<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/main.css">
</head>
<body>

<!-- Sidebar Overlay (mobile) -->
<div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">GP</div>
    <div>
      <div class="logo-text">Grand Palace</div>
      <div class="logo-sub">Admin Portal</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <a href="dashboard.html" class="nav-item active" data-page="dashboard">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="rooms.html" class="nav-item" data-page="rooms">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Rooms
    </a>
    <a href="bookings.html" class="nav-item" data-page="bookings">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Bookings
    </a>
    <div class="nav-section">Management</div>
    <a href="guests.html" class="nav-item" data-page="guests">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Guests
    </a>
    <a href="pricing.html" class="nav-item" data-page="pricing">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Pricing
    </a>
    <a href="services.html" class="nav-item" data-page="services">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      Room Services
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar">A</div>
      <div>
        <div class="user-name" id="userName">Admin</div>
        <div class="user-role" id="userRole">Administrator</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<!-- MAIN -->
<div class="main-content">
  <div class="top-bar">
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    <h1>Dashboard</h1>
    <span id="refreshTimer" style="font-size:12px;color:#6b7a8d;">Auto-refresh in 30s</span>
  </div>

  <div class="page-content">

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-icon navy"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div><div><div class="stat-label">Total Rooms</div><div class="stat-value" id="statTotal">—</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="stat-label">Available</div><div class="stat-value" id="statAvailable">—</div></div></div>
      <div class="stat-card"><div class="stat-icon red"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div><div class="stat-label">Occupied</div><div class="stat-value" id="statOccupied">—</div></div></div>
      <div class="stat-card"><div class="stat-icon orange"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div><div class="stat-label">Maintenance</div><div class="stat-value" id="statMaintenance">—</div></div></div>
      <div class="stat-card"><div class="stat-icon blue"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div><div class="stat-label">Today's Check-ins</div><div class="stat-value" id="statCheckins">—</div></div></div>
      <div class="stat-card"><div class="stat-icon gold"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div><div class="stat-label">Monthly Revenue</div><div class="stat-value" id="statRevenue">—</div></div></div>
    </div>

    <!-- Room Status Grid + Recent Bookings -->
    <div style="display:grid;grid-template-columns:1fr 1.2fr;gap:20px;margin-bottom:24px;" id="twoColGrid">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <div class="card-title" style="margin:0">Room Status</div>
          <span id="statusLegend" style="font-size:12px;color:#6b7a8d;"></span>
        </div>
        <div class="room-grid" id="roomStatusGrid">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Recent Bookings</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Guest</th><th>Room</th><th>Check-in</th><th>Status</th></tr></thead>
            <tbody id="recentBookings"><tr><td colspan="4"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
requireAdmin();
initSidebar();

let countdown = 30;
let timer;

async function loadDashboard() {
  try {
    // Load room stats
    const rooms = await api.get('/rooms/status');
    const total = rooms.length;
    const available = rooms.filter(r => r.Status === 'Available').length;
    const occupied = rooms.filter(r => r.Status === 'Occupied').length;
    const maintenance = rooms.filter(r => r.Status === 'Under Maintenance').length;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statAvailable').textContent = available;
    document.getElementById('statOccupied').textContent = occupied;
    document.getElementById('statMaintenance').textContent = maintenance;

    // Room grid
    const grid = document.getElementById('roomStatusGrid');
    if (rooms.length === 0) {
      grid.innerHTML = '<div class="empty-state"><p>No rooms yet</p></div>';
    } else {
      grid.innerHTML = rooms.map(r => {
        const cls = r.Status === 'Available' ? 'available' : r.Status === 'Occupied' ? 'occupied' : r.Status === 'Under Maintenance' ? 'maintenance' : 'reserved';
        return `<div class="room-tile ${cls}" title="${r.Status}">
          <div class="room-num">${r.RoomNumber}</div>
          <div class="room-type">${(r.RoomType||'').substring(0,6)}</div>
        </div>`;
      }).join('');
    }
  } catch(e) {
    console.error('Room stats error:', e);
  }

  try {
    // Load recent bookings
    const bookings = await api.get('/bookings');
    const tbody = document.getElementById('recentBookings');
    const recent = bookings.slice(0, 10);
    if (recent.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#6b7a8d;padding:24px;">No bookings yet</td></tr>';
    } else {
      tbody.innerHTML = recent.map(b => `
        <tr>
          <td><strong>${b.GuestName || '—'}</strong></td>
          <td>Room ${b.RoomNumber || b.RoomId}</td>
          <td>${formatDate(b.CheckInDate)}</td>
          <td>${statusBadge(b.Status)}</td>
        </tr>`).join('');
    }
  } catch(e) {
    document.getElementById('recentBookings').innerHTML = '<tr><td colspan="4" style="text-align:center;color:#6b7a8d;">Could not load</td></tr>';
  }

  try {
    const stats = await api.get('/bookings/stats');
    document.getElementById('statCheckins').textContent = stats.todayCheckins || 0;
    document.getElementById('statRevenue').textContent = '$' + (stats.monthlyRevenue || 0).toLocaleString();
  } catch(e) {
    document.getElementById('statCheckins').textContent = '0';
    document.getElementById('statRevenue').textContent = '$0';
  }
}

function startCountdown() {
  clearInterval(timer);
  countdown = 30;
  timer = setInterval(() => {
    countdown--;
    const el = document.getElementById('refreshTimer');
    if (el) el.textContent = `Auto-refresh in ${countdown}s`;
    if (countdown <= 0) {
      loadDashboard();
      countdown = 30;
    }
  }, 1000);
}

loadDashboard();
startCountdown();

// Responsive two-col
function checkLayout() {
  const twoCol = document.getElementById('twoColGrid');
  if (twoCol) {
    twoCol.style.gridTemplateColumns = window.innerWidth < 900 ? '1fr' : '1fr 1.2fr';
  }
}
checkLayout();
window.addEventListener('resize', checkLayout);
</script>
</body>
</html>
