<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Services — Grand Palace Hotel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-icon">GP</div><div><div class="logo-text">Grand Palace</div><div class="logo-sub">Admin Portal</div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <a href="dashboard.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a href="rooms.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Rooms</a>
    <a href="bookings.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/></svg>Bookings</a>
    <div class="nav-section">Management</div>
    <a href="guests.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Guests</a>
    <a href="pricing.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/></svg>Pricing</a>
    <a href="services.html" class="nav-item active"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>Room Services</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar" id="userAvatar">A</div><div><div class="user-name" id="userName">Admin</div><div class="user-role" id="userRole">Administrator</div></div></div>
    <button class="logout-btn" onclick="logout()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
  </div>
</aside>

<div class="main-content">
  <div class="top-bar">
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    <h1>Room Services</h1>
    <button class="btn btn-gold" onclick="openAddItemModal()">+ Add Menu Item</button>
  </div>
  <div class="page-content">
    <div id="alertBox"></div>

    <!-- Service Requests -->
    <div class="card mb-3">
      <div class="card-title">Pending Service Requests</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Request ID</th><th>Room</th><th>Guest</th><th>Item</th><th>Qty</th><th>Requested At</th><th>Status</th><th>Action</th></tr></thead>
          <tbody id="requestsTable"><tr><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Menu Items -->
    <div class="card">
      <div class="card-title">Service Menu Items</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Item Name</th><th>Category</th><th>Price</th><th>Available</th><th>Actions</th></tr></thead>
          <tbody id="menuTable"><tr><td colspan="5"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Menu Item Modal -->
<div class="modal-overlay" id="itemModal">
  <div class="modal" style="max-width:440px;">
    <div class="modal-header">
      <div class="modal-title" id="itemModalTitle">Add Menu Item</div>
      <button class="modal-close" onclick="closeModal('itemModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editItemId">
      <div class="form-group"><label>Item Name *</label><input type="text" id="iName" placeholder="e.g. Club Sandwich"></div>
      <div class="form-group">
        <label>Category *</label>
        <select id="iCategory"><option>Food</option><option>Beverage</option><option>Housekeeping</option><option>Laundry</option><option>Maintenance</option></select>
      </div>
      <div class="form-group"><label>Price ($) *</label><input type="number" id="iPrice" placeholder="12.00" min="0" step="0.01"></div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="iAvailable" style="width:auto;" checked>
        <label style="margin:0;">Available for ordering</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('itemModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
requireAdmin();
initSidebar();
let allItems = [];

async function loadAll() {
  await loadRequests();
  await loadMenuItems();
}

async function loadRequests() {
  try {
    const reqs = await api.get('/services/requests');
    const tbody = document.getElementById('requestsTable');
    if (reqs.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:#6b7a8d;">No service requests</td></tr>'; return; }
    tbody.innerHTML = reqs.map(r => `<tr>
      <td>#${r.RequestId}</td>
      <td>Room ${r.RoomNumber || '—'}</td>
      <td>${r.GuestName || '—'}</td>
      <td>${r.ItemName}</td>
      <td>${r.Quantity}</td>
      <td>${formatDate(r.RequestedAt)}</td>
      <td>${statusBadge(r.Status)}</td>
      <td>
        ${r.Status === 'Pending' ? `<button class="btn btn-sm btn-primary" onclick="updateReqStatus(${r.RequestId},'In Progress')">Start</button>` : ''}
        ${r.Status === 'In Progress' ? `<button class="btn btn-sm btn-success" onclick="updateReqStatus(${r.RequestId},'Completed')">Complete</button>` : ''}
      </td>
    </tr>`).join('');
  } catch(e) { showAlert('alertBox', e.message); }
}

async function loadMenuItems() {
  try {
    allItems = await api.get('/services/menu');
    const tbody = document.getElementById('menuTable');
    if (allItems.length === 0) { tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><p>No menu items</p></div></td></tr>'; return; }
    tbody.innerHTML = allItems.map(item => `<tr>
      <td><strong>${item.ItemName}</strong></td>
      <td><span class="badge badge-navy">${item.Category}</span></td>
      <td>${formatCurrency(item.Price)}</td>
      <td><span class="badge ${item.IsAvailable ? 'badge-green' : 'badge-red'}">${item.IsAvailable ? 'Yes' : 'No'}</span></td>
      <td><div style="display:flex;gap:6px;">
        <button class="btn btn-sm btn-outline" onclick="editItem(${item.ItemId})">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteItem(${item.ItemId})">Delete</button>
      </div></td>
    </tr>`).join('');
  } catch(e) { showAlert('alertBox', 'Menu: ' + e.message); }
}

async function updateReqStatus(id, status) {
  try {
    await api.patch(`/services/requests/${id}/status`, { Status: status });
    showAlert('alertBox', 'Request updated!', 'success');
    loadRequests();
  } catch(e) { showAlert('alertBox', e.message); }
}

function openAddItemModal() {
  document.getElementById('editItemId').value = '';
  document.getElementById('itemModalTitle').textContent = 'Add Menu Item';
  document.getElementById('iName').value = '';
  document.getElementById('iCategory').value = 'Food';
  document.getElementById('iPrice').value = '';
  document.getElementById('iAvailable').checked = true;
  document.getElementById('itemModal').classList.add('open');
}

function editItem(id) {
  const item = allItems.find(i => i.ItemId === id);
  if (!item) return;
  document.getElementById('editItemId').value = id;
  document.getElementById('itemModalTitle').textContent = 'Edit Menu Item';
  document.getElementById('iName').value = item.ItemName;
  document.getElementById('iCategory').value = item.Category;
  document.getElementById('iPrice').value = item.Price;
  document.getElementById('iAvailable').checked = !!item.IsAvailable;
  document.getElementById('itemModal').classList.add('open');
}

async function saveItem() {
  const id = document.getElementById('editItemId').value;
  const body = {
    ItemName: document.getElementById('iName').value.trim(),
    Category: document.getElementById('iCategory').value,
    Price: parseFloat(document.getElementById('iPrice').value),
    IsAvailable: document.getElementById('iAvailable').checked ? 1 : 0,
  };
  if (!body.ItemName || !body.Price) { showAlert('alertBox', 'Fill all required fields.'); return; }
  try {
    if (id) await api.put(`/services/menu/${id}`, body);
    else await api.post('/services/menu', body);
    closeModal('itemModal');
    showAlert('alertBox', 'Item saved!', 'success');
    loadMenuItems();
  } catch(e) { showAlert('alertBox', e.message); }
}

async function deleteItem(id) {
  if (!confirmAction('Delete this menu item?')) return;
  try {
    await api.delete(`/services/menu/${id}`);
    showAlert('alertBox', 'Item deleted.', 'success');
    loadMenuItems();
  } catch(e) { showAlert('alertBox', e.message); }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
loadAll();
</script>
</body>
</html>
