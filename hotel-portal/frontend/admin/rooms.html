<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rooms — Grand Palace Hotel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
</head>
<body>

<div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">GP</div>
    <div><div class="logo-text">Grand Palace</div><div class="logo-sub">Admin Portal</div></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <a href="dashboard.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a href="rooms.html" class="nav-item active"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Rooms</a>
    <a href="bookings.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Bookings</a>
    <div class="nav-section">Management</div>
    <a href="guests.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Guests</a>
    <a href="pricing.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Pricing</a>
    <a href="services.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>Room Services</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar" id="userAvatar">A</div><div><div class="user-name" id="userName">Admin</div><div class="user-role" id="userRole">Administrator</div></div></div>
    <button class="logout-btn" onclick="logout()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
  </div>
</aside>

<div class="main-content">
  <div class="top-bar">
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    <h1>Rooms</h1>
    <button class="btn btn-gold" onclick="openAddModal()">+ Add Room</button>
  </div>

  <div class="page-content">
    <div id="alertBox"></div>

    <div class="card">
      <div class="toolbar">
        <div class="toolbar-left">
          <select class="filter-select" id="filterType" onchange="applyFilters()">
            <option value="">All Types</option>
            <option>Single</option><option>Double</option><option>Suite</option><option>Deluxe</option>
          </select>
          <select class="filter-select" id="filterStatus" onchange="applyFilters()">
            <option value="">All Status</option>
            <option>Available</option><option>Occupied</option><option>Under Maintenance</option><option>Reserved</option>
          </select>
          <select class="filter-select" id="filterFloor" onchange="applyFilters()">
            <option value="">All Floors</option>
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
          </select>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Room No.</th><th>Type</th><th>Floor</th><th>Capacity</th><th>Price/Night</th><th>Amenities</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="roomsTable">
            <tr><td colspan="8"><div class="loading"><div class="spinner"></div> Loading rooms...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="roomModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Room</div>
      <button class="modal-close" onclick="closeModal('roomModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editRoomId">
      <div class="form-row">
        <div class="form-group">
          <label>Room Number *</label>
          <input type="text" id="roomNumber" placeholder="e.g. 101">
        </div>
        <div class="form-group">
          <label>Room Type *</label>
          <select id="roomType">
            <option>Single</option><option>Double</option><option>Suite</option><option>Deluxe</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Floor *</label>
          <input type="number" id="roomFloor" placeholder="1" min="1">
        </div>
        <div class="form-group">
          <label>Capacity *</label>
          <input type="number" id="roomCapacity" placeholder="2" min="1">
        </div>
      </div>
      <div class="form-group">
        <label>Base Price Per Night ($) *</label>
        <input type="number" id="roomPrice" placeholder="120.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="roomDesc" placeholder="Room description..."></textarea>
      </div>
      <div class="form-group">
        <label>Amenities</label>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:4px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text);cursor:pointer;"><input type="checkbox" name="amenity" value="WiFi" style="width:auto;"> WiFi</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text);cursor:pointer;"><input type="checkbox" name="amenity" value="AC" style="width:auto;"> AC</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text);cursor:pointer;"><input type="checkbox" name="amenity" value="TV" style="width:auto;"> TV</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text);cursor:pointer;"><input type="checkbox" name="amenity" value="Minibar" style="width:auto;"> Minibar</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text);cursor:pointer;"><input type="checkbox" name="amenity" value="Jacuzzi" style="width:auto;"> Jacuzzi</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text);cursor:pointer;"><input type="checkbox" name="amenity" value="Balcony" style="width:auto;"> Balcony</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('roomModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveRoom()">Save Room</button>
    </div>
  </div>
</div>

<!-- STATUS MODAL -->
<div class="modal-overlay" id="statusModal">
  <div class="modal" style="max-width:380px;">
    <div class="modal-header">
      <div class="modal-title">Change Room Status</div>
      <button class="modal-close" onclick="closeModal('statusModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="statusRoomId">
      <div class="form-group">
        <label>Room <strong id="statusRoomNum"></strong> — New Status</label>
        <select id="newStatus">
          <option>Available</option>
          <option>Occupied</option>
          <option>Under Maintenance</option>
          <option>Reserved</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('statusModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveStatus()">Update Status</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
requireAdmin();
initSidebar();

let allRooms = [];

async function loadRooms() {
  try {
    allRooms = await api.get('/rooms');
    renderRooms(allRooms);
  } catch(e) {
    document.getElementById('roomsTable').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--danger);">Failed to load rooms: ' + e.message + '</td></tr>';
  }
}

function renderRooms(rooms) {
  const tbody = document.getElementById('roomsTable');
  if (rooms.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><p>No rooms found</p><span>Add a room to get started</span></div></td></tr>';
    return;
  }
  tbody.innerHTML = rooms.map(r => {
    const amenities = (r.Amenities || '').split(',').filter(Boolean).map(a => `<span style="background:#f0f0eb;padding:2px 7px;border-radius:4px;font-size:11px;">${a.trim()}</span>`).join(' ');
    return `<tr>
      <td><strong>${r.RoomNumber}</strong></td>
      <td>${r.RoomType}</td>
      <td>Floor ${r.Floor}</td>
      <td>${r.Capacity} person${r.Capacity > 1 ? 's' : ''}</td>
      <td>$${parseFloat(r.BasePricePerNight).toFixed(2)}</td>
      <td style="max-width:160px;">${amenities || '<span style="color:#6b7a8d;font-size:12px;">None</span>'}</td>
      <td>${statusBadge(r.Status)}</td>
      <td>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm btn-outline" onclick="openEditModal(${r.RoomId})">Edit</button>
          <button class="btn btn-sm btn-outline" onclick="openStatusModal(${r.RoomId}, '${r.RoomNumber}', '${r.Status}')">Status</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRoom(${r.RoomId})">Delete</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function applyFilters() {
  const type = document.getElementById('filterType').value;
  const status = document.getElementById('filterStatus').value;
  const floor = document.getElementById('filterFloor').value;
  let filtered = allRooms;
  if (type) filtered = filtered.filter(r => r.RoomType === type);
  if (status) filtered = filtered.filter(r => r.Status === status);
  if (floor) filtered = filtered.filter(r => String(r.Floor) === floor);
  renderRooms(filtered);
}

function openAddModal() {
  document.getElementById('editRoomId').value = '';
  document.getElementById('modalTitle').textContent = 'Add Room';
  document.getElementById('roomNumber').value = '';
  document.getElementById('roomType').value = 'Single';
  document.getElementById('roomFloor').value = '';
  document.getElementById('roomCapacity').value = '';
  document.getElementById('roomPrice').value = '';
  document.getElementById('roomDesc').value = '';
  document.querySelectorAll('input[name="amenity"]').forEach(c => c.checked = false);
  openModal('roomModal');
}

function openEditModal(roomId) {
  const room = allRooms.find(r => r.RoomId === roomId);
  if (!room) return;
  document.getElementById('editRoomId').value = roomId;
  document.getElementById('modalTitle').textContent = 'Edit Room';
  document.getElementById('roomNumber').value = room.RoomNumber;
  document.getElementById('roomType').value = room.RoomType;
  document.getElementById('roomFloor').value = room.Floor;
  document.getElementById('roomCapacity').value = room.Capacity;
  document.getElementById('roomPrice').value = room.BasePricePerNight;
  document.getElementById('roomDesc').value = room.Description || '';
  const amenities = (room.Amenities || '').split(',').map(a => a.trim());
  document.querySelectorAll('input[name="amenity"]').forEach(c => { c.checked = amenities.includes(c.value); });
  openModal('roomModal');
}

function openStatusModal(roomId, roomNum, currentStatus) {
  document.getElementById('statusRoomId').value = roomId;
  document.getElementById('statusRoomNum').textContent = roomNum;
  document.getElementById('newStatus').value = currentStatus;
  openModal('statusModal');
}

async function saveRoom() {
  const id = document.getElementById('editRoomId').value;
  const amenities = Array.from(document.querySelectorAll('input[name="amenity"]:checked')).map(c => c.value).join(',');
  const body = {
    RoomNumber: document.getElementById('roomNumber').value.trim(),
    RoomType: document.getElementById('roomType').value,
    Floor: parseInt(document.getElementById('roomFloor').value),
    Capacity: parseInt(document.getElementById('roomCapacity').value),
    BasePricePerNight: parseFloat(document.getElementById('roomPrice').value),
    Description: document.getElementById('roomDesc').value.trim(),
    Amenities: amenities,
  };
  if (!body.RoomNumber || !body.Floor || !body.Capacity || !body.BasePricePerNight) {
    showAlert('alertBox', 'Please fill all required fields.'); return;
  }
  try {
    if (id) await api.put(`/rooms/${id}`, body);
    else await api.post('/rooms', body);
    closeModal('roomModal');
    showAlert('alertBox', 'Room saved successfully!', 'success');
    loadRooms();
  } catch(e) {
    showAlert('alertBox', e.message);
  }
}

async function saveStatus() {
  const id = document.getElementById('statusRoomId').value;
  const status = document.getElementById('newStatus').value;
  try {
    await api.patch(`/rooms/${id}/status`, { Status: status });
    closeModal('statusModal');
    showAlert('alertBox', 'Status updated!', 'success');
    loadRooms();
  } catch(e) {
    showAlert('alertBox', e.message);
  }
}

async function deleteRoom(id) {
  if (!confirmAction('Delete this room? This cannot be undone.')) return;
  try {
    await api.delete(`/rooms/${id}`);
    showAlert('alertBox', 'Room deleted.', 'success');
    loadRooms();
  } catch(e) {
    showAlert('alertBox', e.message);
  }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

loadRooms();
</script>
</body>
</html>
