<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Rooms — Grand Palace Hotel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<style>
.search-bar { background:#fff; border-radius:var(--radius); padding:24px; border:1px solid var(--border); box-shadow:var(--shadow); margin-bottom:24px; }
.search-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr auto; gap:14px; align-items:end; }
.room-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
.room-card { background:#fff; border-radius:14px; border:1px solid var(--border); box-shadow:var(--shadow); overflow:hidden; transition:all 0.2s; }
.room-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
.room-card-img { height:160px; background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%); display:flex; align-items:center; justify-content:center; position:relative; }
.room-card-img .room-type-big { font-family:'Playfair Display',serif; font-size:32px; font-weight:700; color:rgba(255,255,255,0.15); }
.room-card-img .room-num-badge { position:absolute; top:12px; left:12px; background:var(--gold); color:var(--navy); font-weight:700; font-size:13px; padding:4px 12px; border-radius:20px; }
.room-card-body { padding:20px; }
.room-card-title { font-family:'Playfair Display',serif; font-size:18px; font-weight:600; margin-bottom:4px; }
.room-card-sub { font-size:13px; color:var(--text-muted); margin-bottom:12px; }
.amenity-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
.amenity-tag { background:var(--bg); font-size:11px; padding:3px 8px; border-radius:4px; color:var(--text-muted); }
.room-card-footer { display:flex; align-items:center; justify-content:space-between; padding-top:14px; border-top:1px solid var(--border); }
.room-price { font-size:22px; font-weight:700; color:var(--navy); }
.room-price span { font-size:12px; font-weight:400; color:var(--text-muted); }
.total-price { font-size:12px; color:var(--text-muted); margin-top:2px; }

@media(max-width:900px){ .search-grid{ grid-template-columns:1fr 1fr; } }
@media(max-width:600px){ .search-grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-icon">GP</div><div><div class="logo-text">Grand Palace</div><div class="logo-sub">Guest Portal</div></div></div>
  <nav class="sidebar-nav">
    <a href="index.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>My Dashboard</a>
    <a href="browse-rooms.html" class="nav-item active"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Browse Rooms</a>
    <a href="my-bookings.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>My Bookings</a>
    <a href="room-service.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>Room Service</a>
    <a href="about.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>About Us</a>
    <a href="contact.html" class="nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Contact Us</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar" id="userAvatar">G</div><div><div class="user-name" id="userName">Guest</div><div class="user-role" id="userRole">Guest</div></div></div>
    <button class="logout-btn" onclick="logout()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
  </div>
</aside>

<div class="main-content">
  <div class="top-bar">
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    <h1>Browse Rooms</h1>
  </div>
  <div class="page-content">
    <div id="alertBox"></div>

    <div class="search-bar">
      <div class="search-grid">
        <div class="form-group" style="margin:0;">
          <label>Check-in Date</label>
          <input type="date" id="checkin">
        </div>
        <div class="form-group" style="margin:0;">
          <label>Check-out Date</label>
          <input type="date" id="checkout">
        </div>
        <div class="form-group" style="margin:0;">
          <label>Room Type</label>
          <select id="roomType">
            <option value="">Any Type</option>
            <option>Single</option><option>Double</option><option>Suite</option><option>Deluxe</option>
          </select>
        </div>
        <div class="form-group" style="margin:0;">
          <label>Max Price / Night ($)</label>
          <input type="number" id="maxPrice" placeholder="Any" min="0">
        </div>
        <button class="btn btn-primary" onclick="searchRooms()" style="height:42px;">Search</button>
      </div>
    </div>

    <div id="resultsArea">
      <div class="room-cards" id="roomCards">
        <div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text-muted);">
          <p style="font-size:15px;">Select your dates and click Search to find available rooms.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="bookModal">
  <div class="modal" style="max-width:460px;">
    <div class="modal-header">
      <div class="modal-title">Confirm Booking</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="bookModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="confirmBook()">Confirm Booking</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
requireGuest();
initSidebar();

// Set default dates
const today = new Date();
const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
const dayAfter = new Date(today); dayAfter.setDate(today.getDate() + 3);
document.getElementById('checkin').value = tomorrow.toISOString().split('T')[0];
document.getElementById('checkout').value = dayAfter.toISOString().split('T')[0];

let selectedRoom = null;
let searchCheckin = '', searchCheckout = '';

async function searchRooms() {
  const checkin = document.getElementById('checkin').value;
  const checkout = document.getElementById('checkout').value;
  const type = document.getElementById('roomType').value;
  const maxPrice = document.getElementById('maxPrice').value;

  if (!checkin || !checkout) { showAlert('alertBox','Please select check-in and check-out dates.'); return; }
  if (new Date(checkout) <= new Date(checkin)) { showAlert('alertBox','Check-out must be after check-in.'); return; }

  searchCheckin = checkin;
  searchCheckout = checkout;

  const nights = Math.ceil((new Date(checkout) - new Date(checkin)) / (1000*60*60*24));

  document.getElementById('roomCards').innerHTML = '<div style="grid-column:1/-1;"><div class="loading"><div class="spinner"></div> Searching available rooms...</div></div>';

  try {
    let endpoint = `/rooms/available?checkin=${checkin}&checkout=${checkout}`;
    if (type) endpoint += `&type=${encodeURIComponent(type)}`;
    if (maxPrice) endpoint += `&maxprice=${maxPrice}`;

    const rooms = await api.get(endpoint);
    renderRooms(rooms, nights);
  } catch(e) {
    showAlert('alertBox', e.message);
    document.getElementById('roomCards').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--danger);">Failed to load rooms.</div>';
  }
}

function renderRooms(rooms, nights) {
  const container = document.getElementById('roomCards');
  if (rooms.length === 0) {
    container.innerHTML = '<div style="grid-column:1/-1;"><div class="empty-state"><p>No rooms available for your dates</p><span>Try different dates or room type</span></div></div>';
    return;
  }

  const amenityIcons = { 'WiFi':'📶', 'AC':'❄️', 'TV':'📺', 'Minibar':'🍾', 'Jacuzzi':'🛁', 'Balcony':'🌅' };

  container.innerHTML = rooms.map(r => {
    const price = parseFloat(r.EffectivePrice || r.BasePricePerNight);
    const total = price * nights;
    const amenities = (r.Amenities || '').split(',').filter(Boolean);
    const amenityTags = amenities.map(a => `<span class="amenity-tag">${amenityIcons[a.trim()] || '✓'} ${a.trim()}</span>`).join('');

    return `<div class="room-card">
      <div class="room-card-img">
        <div class="room-type-big">${r.RoomType.charAt(0)}</div>
        <div class="room-num-badge">Room ${r.RoomNumber}</div>
      </div>
      <div class="room-card-body">
        <div class="room-card-title">${r.RoomType} Room</div>
        <div class="room-card-sub">Floor ${r.Floor} &bull; Up to ${r.Capacity} guest${r.Capacity > 1 ? 's' : ''}</div>
        <div class="amenity-tags">${amenityTags || '<span class="amenity-tag">Standard amenities</span>'}</div>
        ${r.Description ? `<p style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">${r.Description}</p>` : ''}
        <div class="room-card-footer">
          <div>
            <div class="room-price">$${price.toFixed(2)} <span>/ night</span></div>
            <div class="total-price">$${total.toFixed(2)} total for ${nights} night${nights>1?'s':''}</div>
          </div>
          <button class="btn btn-gold" onclick="openBookModal(${JSON.stringify(r).replace(/"/g,'&quot;')}, ${nights}, ${price})">Book Now</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openBookModal(room, nights, price) {
  selectedRoom = { room, nights, price };
  const total = price * nights;
  document.getElementById('bookModalBody').innerHTML = `
    <div style="background:var(--bg);border-radius:10px;padding:16px;margin-bottom:20px;">
      <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:600;margin-bottom:4px;">Room ${room.RoomNumber} — ${room.RoomType}</div>
      <div style="color:var(--text-muted);font-size:13px;">Floor ${room.Floor} &bull; ${room.Capacity} guests</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
      <div><div class="stat-label">Check-in</div><div style="font-weight:500;">${formatDate(searchCheckin)}</div></div>
      <div><div class="stat-label">Check-out</div><div style="font-weight:500;">${formatDate(searchCheckout)}</div></div>
      <div><div class="stat-label">Duration</div><div style="font-weight:500;">${nights} night${nights>1?'s':''}</div></div>
      <div><div class="stat-label">Price/Night</div><div style="font-weight:500;">$${price.toFixed(2)}</div></div>
    </div>
    <div style="background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:10px;padding:16px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-weight:600;">Total Amount</span>
      <span style="font-size:22px;font-weight:700;color:var(--navy);">$${total.toFixed(2)}</span>
    </div>`;
  document.getElementById('bookModal').classList.add('open');
}

async function confirmBook() {
  if (!selectedRoom) return;
  try {
    await api.post('/bookings', {
      RoomId: selectedRoom.room.RoomId,
      CheckInDate: searchCheckin,
      CheckOutDate: searchCheckout,
    });
    closeModal();
    showAlert('alertBox', 'Booking confirmed! Check your bookings page.', 'success');
    searchRooms();
  } catch(e) {
    showAlert('alertBox', e.message);
  }
}

function closeModal() { document.getElementById('bookModal').classList.remove('open'); }
</script>
</body>
</html>
